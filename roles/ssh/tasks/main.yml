- name: Require ssh admin public key
  ansible.builtin.assert:
    that:
      - ssh_admin_pubkey | length > 0
    fail_msg: "ssh_admin_pubkey is required (pass via extra vars or inventory vars)."

- name: Ensure ssh admin user exists
  ansible.builtin.user:
    name: "{{ ssh_admin_user }}"
    groups: "{{ ssh_admin_groups }}"
    append: true
    shell: /bin/bash
    state: present

- name: Configure sudoers for ssh admin user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ ssh_admin_user }}"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
    content: |
      {{ ssh_admin_user }} ALL=(ALL) NOPASSWD: ALL

- name: Ensure ssh admin authorized_keys is present
  ansible.builtin.authorized_key:
    user: "{{ ssh_admin_user }}"
    key: "{{ ssh_admin_pubkey }}"
    state: present
    manage_dir: true

- name: Ensure sshd config drop-in directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure sshd hardening drop-in
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-infra-hardening.conf
    owner: root
    group: root
    mode: "0644"
    validate: "sshd -t -f %s"
    content: |
      PermitRootLogin {{ ssh_root_login }}
      PasswordAuthentication {{ 'yes' if ssh_password_auth else 'no' }}
      KbdInteractiveAuthentication no
      ChallengeResponseAuthentication no
      PubkeyAuthentication yes
      AuthorizedKeysFile .ssh/authorized_keys
  notify: Validate and reload sshd

- name: Validate sshd config
  ansible.builtin.command: sshd -t
  changed_when: false

- name: Verify sshd effective settings
  ansible.builtin.shell: |
    set -euo pipefail
    sshd -T | grep -q '^permitrootlogin {{ ssh_root_login }}$'
    sshd -T | grep -q '^passwordauthentication {{ "yes" if ssh_password_auth else "no" }}$'
    sshd -T | grep -q '^kbdinteractiveauthentication no$'
    sshd -T | grep -q '^challengeresponseauthentication no$'
    sshd -T | grep -q '^pubkeyauthentication yes$'
  args:
    executable: /bin/bash
  changed_when: false

- name: Verify SSH login as admin user
  ansible.builtin.wait_for_connection:
    timeout: 20
  vars:
    ansible_user: "{{ ssh_verify_user }}"
    ansible_ssh_private_key_file: "{{ ssh_verify_private_key_file | default(omit) }}"
  when: ssh_verify_connection
