- name: Smoke check (facts only)
  hosts: all
  gather_facts: true
  tasks:
    - name: Show minimal host facts
      ansible.builtin.debug:
        msg:
          - "ansible_distribution={{ ansible_facts['distribution'] }}"
          - "ansible_distribution_version={{ ansible_facts['distribution_version'] }}"
          - "ansible_kernel={{ ansible_facts['kernel'] }}"
          - "ansible_architecture={{ ansible_facts['architecture'] }}"
          - "ansible_python_version={{ ansible_facts['python_version'] }}"
