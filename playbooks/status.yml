---
- name: Status phases
  hosts: infra
  gather_facts: false
  become: true
  vars:
    ansible_host: "{{ lookup('env', 'INFRA_SSH_HOST') }}"
    ansible_user: "{{ lookup('env', 'INFRA_SSH_USER') | default('root', true) }}"
    ansible_ssh_private_key_file: "{{ lookup('env', 'INFRA_SSH_PRIVATE_KEY_FILE') | default(lookup('env', 'ANSIBLE_PRIVATE_KEY_FILE'), true) }}"
    phase_order: ["00", "01", "02", "03", "04", "05", "06", "07"]
  pre_tasks:
    - name: Collect minimal facts
      setup:
        gather_subset:
          - min
    - name: Validate phase_target
      assert:
        that:
          - phase_target in phase_order
        fail_msg: "phase_target must be in phase_order"
    - name: Resolve phase index
      set_fact:
        phase_target_idx: "{{ phase_order.index(phase_target) | int }}"
  tasks:
    - name: Status phases up to target
      include_tasks: "phases/phase_{{ item }}.yml"
      vars:
        phase_id: "{{ item }}"
        phase_mode: "status"
      loop: "{{ phase_order[0:((phase_target_idx | int) + 1)] }}"
    - name: Output phase status
      debug:
        msg: "phase={{ item.key }} status={{ item.value }}"
      loop: "{{ (phase_status_map | default({})) | dict2items }}"
    - name: Output non-success reasons
      debug:
        msg: "phase={{ item.key }} reason={{ phase_reason_map[item.key] | default('unknown') }}"
      loop: >-
        {{
          (phase_status_map | default({}))
          | dict2items
          | rejectattr('value', 'equalto', 'cur-success')
          | list
        }}
    - name: Output status summary
      debug:
        msg: >-
          phase_target={{ phase_target }}
          phases={{ (phase_status_map | default({})) | length }}
          healthy={{ (phase_status_map | default({}) | dict2items | selectattr('value', 'equalto', 'cur-success') | list | length) }}
