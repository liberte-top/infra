name: apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub environment name"
        type: string
        required: false
        default: "prod"

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install ansible

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.INFRA_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Write inventory from secrets
        run: |
          export INFRA_SSH_HOST="${{ secrets.INFRA_SSH_HOST }}"
          export INFRA_SSH_USER="${{ secrets.INFRA_SSH_USER }}"
          envsubst < inventories/production/hosts.yml.tmpl > inventories/production/hosts.yml

      - name: Smoke apply (facts only)
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: "default"
          ANSIBLE_CALLBACK_RESULT_FORMAT: "yaml"
        run: |
          ansible-playbook playbooks/smoke.yml

      - name: Apply SSH hardening (P0)
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > /tmp/k8s_admin_id_rsa
          chmod 600 /tmp/k8s_admin_id_rsa
          ssh-keygen -y -f /tmp/k8s_admin_id_rsa > /tmp/k8s_admin.pub
          ansible-playbook playbooks/ssh.yml \
            -e "ssh_admin_pubkey=$(cat /tmp/k8s_admin.pub)"
          rm -f /tmp/k8s_admin_id_rsa /tmp/k8s_admin.pub
