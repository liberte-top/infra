name: ci.rollup

on:
  workflow_dispatch:
    inputs:
      phase_from:
        description: "Start phase (e.g. 00)"
        required: true
        default: "00"
      phase_to:
        description: "End phase (e.g. 00)"
        required: true
        default: "00"

concurrency:
  group: infra-phase-serial
  cancel-in-progress: false

jobs:
  rollup:
    runs-on: ubuntu-latest
    container:
      image: willhallonline/ansible:2.18-alpine-3.22
    env:
      INFRA_SSH_HOST: ${{ secrets.INFRA_SSH_HOST }}
      INFRA_SSH_USER: ${{ secrets.INFRA_SSH_USER }}
      INFRA_SSH_PRIVATE_KEY: ${{ secrets.INFRA_SSH_PRIVATE_KEY }}
      INFRA_SSH_KNOWN_HOSTS: ${{ secrets.INFRA_SSH_KNOWN_HOSTS }}
      ANSIBLE_HOST_KEY_CHECKING: "True"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          umask 077
          printf '%s\n' "$INFRA_SSH_PRIVATE_KEY" > /tmp/infra_ssh_key
          echo "ANSIBLE_PRIVATE_KEY_FILE=/tmp/infra_ssh_key" >> "$GITHUB_ENV"

      - name: Prepare SSH known_hosts
        run: |
          umask 077
          test -n "$INFRA_SSH_KNOWN_HOSTS"
          printf '%s\n' "$INFRA_SSH_KNOWN_HOSTS" > /tmp/infra_known_hosts
          {
            echo 'ANSIBLE_SSH_ARGS=-o UserKnownHostsFile=/tmp/infra_known_hosts -o StrictHostKeyChecking=yes'
            echo 'GIT_SSH_COMMAND=ssh -o UserKnownHostsFile=/tmp/infra_known_hosts -o StrictHostKeyChecking=yes'
          } >> "$GITHUB_ENV"

      - name: Rollup
        run: |
          ansible-playbook -i inventory/hosts.ini playbooks/rollup.yml \
            -e phase_from="${{ inputs.phase_from }}" \
            -e phase_to="${{ inputs.phase_to }}"

      - name: Status (post-rollup)
        run: |
          ansible-playbook -i inventory/hosts.ini playbooks/status.yml \
            -e phase_target="${{ inputs.phase_to }}"
